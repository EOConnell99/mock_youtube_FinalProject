openapi: 3.0.3

info:
  title: Blog API
  version: 1.0.0
  description: API documentation for the Blog API

servers:
  - url: http://localhost:3001/api
tags:
  - name: Posts
    description: Operations related to blog posts
  - name: Auth
    description: User authentication endpoints
paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user
      description: Authenticate a user and return an access token.
      requestBody:
        description: User login credentials
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Authentication succesful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                example:
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...."
        "400":
          $ref: "#/components/responses/InvalidUserInput"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: "Invalid credentials"
  /auth/signup:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Create a new user account.
      requestBody:
        description: User signup credentials
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
            example:
              username: "exampleuser"
              email: "newuser@example.com"
              password: "securePassword123"
      responses:
        "201":
          description: User successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: 1
                email: "newuser@example.com"
                createdAt: "2026-03-04T20:30:00Z"
        "400":
          $ref: "#/components/responses/InvalidUserInput"

components:
  schemas:
    AuthCredentials:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      example:
        email: "alice@test.com"
        password: "alice1234"
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        email:
          type: string
          example: "user@example.com"
        createdAt:
          type: string
          readOnly: true
          example: "2026-03-04T20:30:00Z"
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: "Resource 1 not found"

    InvalidId:
      description: Invalid ID
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors: [ "ID must be a positive integer" ]
    InvalidPostInput:
      description: Bad Request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - "Title must be at least 3 characters"
    Unauthorized:
      description: Client is not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: "Not authenticated. Please provide a valid token."
    InvalidUserInput:
      description: Bad Request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - "Email is required"
                - "Password is required"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
