openapi: 3.0.3

info:
  title: Blog API
  version: 1.0.0
  description: API documentation for the Blog API

servers:
  - url: http://localhost:3001/api
tags:
  - name: Auth
    description: User authentication endpoints
  - name: Channels
    description: Endpoints related to Channels.
  - name: Videos
    description: Endpoints related to Videos.
paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user
      description: Authenticate a user and return an access token.
      requestBody:
        description: User login credentials
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Authentication succesful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                example:
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...."
        "400":
          $ref: "#/components/responses/InvalidUserInput"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: "Invalid credentials"
  /auth/signup:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Create a new user account.
      requestBody:
        description: User signup credentials
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
            example:
              username: "exampleuser"
              email: "newuser@example.com"
              password: "securePassword123"
      responses:
        "201":
          description: User successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: 1
                email: "newuser@example.com"
                createdAt: "2026-03-04T20:30:00Z"
        "400":
          $ref: "#/components/responses/InvalidUserInput"
  /channels:
    get:
      tags:
        - Channels
      summary: Get all channels
      description: Retrieve a list of all channels.
      #parameters:
      #- $ref: "#/components/parameters/SearchParam"
      #- $ref: "#/components/parameters/SortByParam"
      #- $ref: "#/components/parameters/OrderParam"
      #- $ref: "#/components/parameters/OffsetParam"
      #- $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: A list of channels.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"
    post:
      security:
        - bearerAuth: []
      tags:
        - Channels
      summary: Create a channel.
      description: Create a new channel for the logged in user.
      requestBody:
        description: The channel object to create.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Channel"
      responses:
        "201":
          description: Channel succesfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "400":
          $ref: "#/components/responses/InvalidPostInput"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /channels/{id}:
    get:
      tags:
        - Channels
      summary: Get a channel by id
      description: Retrieve a single channel by its ID.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: A single channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/InvalidId"
    put:
      security:
        - bearerAuth: []
      tags:
        - Channels
      summary: Update a channel
      description: Update the name and/or description of an existing channel.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        description: Fields to update for the channel
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Updated Name"
                desc:
                  type: string
                  example: "Updated content of the post"
            example:
              name: "Updated Name"
              desc: "Updated desc of the channel"
      responses:
        "200":
          description: Channel successfully updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "400":
          description: Bad Request due to invalid ID or invalid channel data
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
              example:
                errors:
                  - "ID must be a positive integer"
                  - "Name must be at least 3 characters"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      security:
        - bearerAuth: []
      tags:
        - Channels
      summary: Delete a post
      description: Delete an existing Channel by its ID.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Channel successfully deleted
        "400":
          $ref: "#/components/responses/InvalidId"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /videos:
    get:
      tags:
        - Videos
      summary: Get all videos
      description: Retrieve a list of all videos.
      responses:
        "200":
          description: A list of videos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"

    post:
      security:
        - bearerAuth: []
      tags:
        - Videos
      summary: Create a video
      description: Create a new video for a channel owned by the logged in user.
      requestBody:
        description: The video object to create.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Video"
      responses:
        "201":
          description: Video successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "400":
          $ref: "#/components/responses/InvalidPostInput"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /videos/{id}:
    get:
      tags:
        - Videos
      summary: Get a video by id
      description: Retrieve a single video by its ID.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: A single video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "400":
          $ref: "#/components/responses/InvalidId"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      security:
        - bearerAuth: []
      tags:
        - Videos
      summary: Update a video
      description: Update the title and/or description of an existing video.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        description: Fields to update for the video
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: "Updated Video Title"
                desc:
                  type: string
                  example: "Updated video description"
            example:
              title: "Updated Video Title"
              desc: "Updated video description"
      responses:
        "200":
          description: Video successfully updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "400":
          description: Bad Request due to invalid ID or invalid video data
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
              example:
                errors:
                  - "ID must be a positive integer"
                  - "Title must be at least 3 characters"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      security:
        - bearerAuth: []
      tags:
        - Videos
      summary: Delete a video
      description: Delete an existing video by its ID.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Video successfully deleted
        "400":
          $ref: "#/components/responses/InvalidId"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  schemas:
    AuthCredentials:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      example:
        email: "alice@test.com"
        password: "alice1234"
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        email:
          type: string
          example: "user@example.com"
        createdAt:
          type: string
          readOnly: true
          example: "2026-03-04T20:30:00Z"
    Channel:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: "First Channel"
        desc:
          type: string
          example: "This is the description of the first channel"
        user_id:
          type: integer
          readOnly: true
          example: 1
    Video:
      type: object
      required:
        - id
        - title
        - desc
        - channelId
      properties:
        id:
          type: integer
          example: 1
          readOnly: true
        title:
          type: string
          example: "How to Learn Prisma Fast"
        desc:
          type: string
          example: "A beginner-friendly tutorial covering Prisma basics."
        channel_id:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
          example: "2026-04-28T18:30:00.000Z"
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-28T19:15:00.000Z"
          readOnly: true
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: integer
        example: 1
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: "Resource 1 not found"

    InvalidId:
      description: Invalid ID
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors: [ "ID must be a positive integer" ]
    InvalidPostInput:
      description: Bad Request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - "Name must be at least 3 characters"
    Unauthorized:
      description: Client is not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: "Not authenticated. Please provide a valid token."
    InvalidUserInput:
      description: Bad Request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - "Email is required"
                - "Password is required"
    Forbidden:
      description: Forbidden - user not allowed to delete this resource
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
          example:
            error: "You are not allowed to delete this resource"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
